name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (with voyage extra)
        run: uv sync --extra voyage --group dev

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy (strict)
        run: uv run mypy --strict src

      - name: Pytest (unit tier — integration is a no-op without ATLAS_URI)
        run: uv run pytest -q
